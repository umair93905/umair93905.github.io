---
layout: default
---
<article class="page-panel reveal">
  {% if page.title and page.title != "Home" %}
  <header class="page-heading">
    <p class="eyebrow">{{ page.subtitle | default: "Portfolio Section" }}</p>
    <h1>{{ page.title }}</h1>
  </header>
  {% endif %}
  {{ content }}
</article>
