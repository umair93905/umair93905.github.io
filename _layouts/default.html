<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}">

{% include head.html %}

<body class="{{ page.page_class | default: page.title | slugify | default: 'site' }}">
  <div class="site-orb site-orb-one"></div>
  <div class="site-orb site-orb-two"></div>
  <div class="site-grid"></div>

  <header class="site-header smooth">
    <a class="site-brand" href="{{ "/" | relative_url }}">
      <span class="brand-mark">MU</span>
      <span class="brand-copy">
        <strong>{{ site.title | escape }}</strong>
        <span>Computer Engineering Portfolio</span>
      </span>
    </a>
    {% include menu.html menu=site.navigation %}
  </header>

  <main class="site-shell">
    {{ content }}
  </main>

  <footer class="site-footer smooth">
    <p>{{ site.description }}</p>
    {% include menu.html menu=site.external %}
  </footer>
</body>

</html>
